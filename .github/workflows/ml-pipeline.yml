# .github/workflows/ml-pipeline.yml
name: MLOps Core CI Pipeline

# 1. Trigger this workflow whenever someone pushes code to the 'main' branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # JOB 1: Verify Code & Dependencies
  code-sanity-check:
    runs-on: ubuntu-latest # Rents a clean, temporary Ubuntu cloud machine

    steps:
      # Step A: Download the code from your GitHub repo onto the runner machine
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step B: Set up a clean Python environment
      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step C: Install your project requirements
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step D: Syntax validation check
      - name: Verify API Script Compiles
        run: python -m py_compile main.py

  # JOB 2: Verify Docker Build (Runs only if Job 1 succeeds)
  docker-build-check:
    runs-on: ubuntu-latest
    needs: code-sanity-check # Dependency link

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step E: Test building the image using your local Dockerfile
      - name: Test Docker Image Build
        run: |
          docker build -t test-ml-api:latest .
          print("Docker build test passed successfully!")