name: MLOps Production CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  code-sanity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API Script Compiles
        run: python -m py_compile main.py

  build-and-push-to-cloud:
    runs-on: ubuntu-latest
    needs: code-sanity-check

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step 1: Log directly into Docker Hub using your encrypted secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Step 2: Build the container image and upload it live to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # This labels your image with your username and tags it as latest production
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ml-api:latest